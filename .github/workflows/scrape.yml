name: Schiffsposition aktualisieren (manuell)
# Automatisches Scraping laeuft als Cronjob auf dem Raspberry Pi.
# Dieser Workflow kann manuell als Fallback ausgefuehrt werden.

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug-Ausgabe aktivieren'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Playwright-Browser installieren
        run: python -m playwright install chromium --with-deps

      - name: Schiffsposition und Wetter scrapen
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          SCRAPE_DEBUG: ${{ inputs.debug && '1' || '' }}
        run: python scripts/scrape.py

      - name: Daten committen und pushen
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add data/position.json data/history.json
          [ -f data/weather.json ] && git add data/weather.json || true
          if git diff --staged --quiet; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git commit -m "data: Schiffsposition + Wetter $(date -u '+%Y-%m-%dT%H:%MZ')"
            git push origin HEAD:${{ github.ref_name }}
          fi
